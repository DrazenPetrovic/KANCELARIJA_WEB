# Nginx konfiguracija za KANCELARIJA_WEB aplikaciju
# Server: karpas.app (HTTPS)
#
# VAZNO: karpas.app vec ima druge aplikacije i vec ima izdat SSL sertifikat.
# Ne treba novi/posebni sertifikat za ovu aplikaciju - samo dodaj location
# blokove ispod UNUTAR POSTOJECEG server bloka (listen 443 ssl) za karpas.app,
# pored ostalih location blokova koji vec tu stoje.

# Redirect /kancelarija bez trailing slash -> /kancelarija/
location = /kancelarija {
    return 301 /kancelarija/;
}

# Proxy svih zahtjeva /kancelarija/ na Express (port 3002)
# Nginx automatski skida /kancelarija/ prefiks prije proslijedjivanja
location /kancelarija/ {
    proxy_pass http://localhost:3002/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Cookie path: auth cookie vrijedi samo za /kancelarija/
    proxy_cookie_path / /kancelarija/;
}

# -------------------------------------------------------------------
# DEPLOYMENT KORACI NA SERVERU (karpas.app):
#
# 1. Kloniraj/kopiraj projekat na server
#    git clone <repo> /var/www/kancelarija
#    cd /var/www/kancelarija
#
# 2. Instaliraj dependencije
#    npm install
#
# 3. Kreiraj .env fajl (kopiraj .env.example i popuni vrijednosti)
#    cp .env.example .env
#    nano .env
#    -> FRONTEND_URL=https://karpas.app
#    -> NODE_ENV=production
#
# 4. Buildiraj frontend (VITE_API_URL iz .env.production se bake in,
#    vec postavljeno na https://karpas.app/kancelarija)
#    npm run build
#
# 5. Pokreni server sa PM2
#    npm install -g pm2
#    pm2 start server.mjs --name kancelarija
#    pm2 save
#    pm2 startup
#
# 6. Dodaj location blokove (sadrzaj iznad) u POSTOJECI server blok
#    za karpas.app (onaj sa "listen 443 ssl" i ssl_certificate liniama)
#    sudo nano /etc/nginx/sites-available/karpas.app
#    sudo nginx -t
#    sudo systemctl reload nginx
#
#    Sertifikat se NE radi posebno - vec postoji za karpas.app domen
#    i pokriva sve location blokove/putanje na tom domenu.
# -------------------------------------------------------------------
